name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Tell us what you expected instead.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: desktop-os
    attributes:
      label: Desktop OS
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: false
  - type: input
    id: desktop-browser
    attributes:
      label: Desktop Browser
      placeholder: e.g. Chrome, Safari, Firefox
    validations:
      required: false
  - type: input
    id: desktop-version
    attributes:
      label: Desktop Browser Version
      placeholder: e.g. 125
    validations:
      required: false
  - type: input
    id: mobile-device
    attributes:
      label: Smartphone Device
      placeholder: e.g. iPhone 15
    validations:
      required: false
  - type: input
    id: mobile-os
    attributes:
      label: Smartphone OS
      placeholder: e.g. iOS 18, Android 15
    validations:
      required: false
  - type: input
    id: mobile-browser
    attributes:
      label: Smartphone Browser
      placeholder: e.g. Safari, Chrome
    validations:
      required: false
  - type: input
    id: mobile-version
    attributes:
      label: Smartphone Browser Version
      placeholder: e.g. 125
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
